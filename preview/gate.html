<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TEZ Creations — Something great is on the way</title>
<meta name="description" content="TEZ Creations — something great is on the way." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/preview/tez.css" />
<style>
  /* ---------- gate page ---------- */
  .gate {
    min-height: 100vh; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    padding: 48px 24px; overflow: hidden;
  }
  .gate-inner {
    width: 100%; max-width: 440px;
    display: flex; flex-direction: column; align-items: center; text-align: center;
    /* match the real gate's camera-pan speed + easing */
    transition: transform 1.15s cubic-bezier(0.76, 0, 0.24, 1), opacity .8s ease;
  }
  /* the whole thing slides up into the home page on unlock */
  body.stage-done .gate-inner { transform: translateY(-108vh); opacity: 0; }

  /* centered lockup — larger mark than the header. Prominent in the splash,
     settles down/up smoothly when the password panel opens. */
  .gate .lockup {
    flex-direction: column; gap: 18px; margin-bottom: 26px;
    transition: transform 1.15s cubic-bezier(0.76, 0, 0.24, 1);
  }
  body:not(.stage-unlock) .gate .lockup { transform: translateY(22px) scale(1.06); }
  .gate .mark { width: 58px; height: 58px; border-radius: 14px; }
  .gate .mark svg { width: 32px; height: 32px; }
  .gate .wordmark { align-items: center; }
  .gate .wordmark .name { font-size: 1.65rem; letter-spacing: -0.01em; }
  .gate .wordmark .sub { letter-spacing: 0.32em; margin-top: 8px; }

  /* ---- splash: "something great is on the way…" + Enter ---- */
  .splash {
    width: 100%; overflow: hidden;
    /* room for the Enter button's glow so overflow:hidden doesn't clip it */
    padding-bottom: 40px;
    max-height: 300px; opacity: 1; margin-top: 6px;
    transition: max-height 1.05s cubic-bezier(0.76, 0, 0.24, 1), opacity .7s ease, margin-top 1.05s cubic-bezier(0.76, 0, 0.24, 1);
  }
  body.stage-unlock .splash { max-height: 0; opacity: 0; margin-top: 0; }
  .coming {
    color: var(--muted); font-size: var(--t-lg); line-height: 1.5; margin: 0 0 30px;
  }
  .dots span {
    opacity: 0; color: var(--accent); font-weight: 600;
    animation: dot-blink 1.6s infinite;
  }
  .dots span:nth-child(1) { animation-delay: 0s; }
  .dots span:nth-child(2) { animation-delay: 0.25s; }
  .dots span:nth-child(3) { animation-delay: 0.5s; }
  @keyframes dot-blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
  .enter-btn { min-width: 190px; height: 50px; justify-content: center; font-size: var(--t-base); }

  /* ---- password panel: hidden until Enter, then slides + fades in ---- */
  .card-wrap {
    width: 100%; overflow: hidden;
    max-height: 0; opacity: 0;
    transition: max-height 1.15s cubic-bezier(0.76, 0, 0.24, 1) .08s, opacity .8s ease .18s;
  }
  body.stage-unlock .card-wrap { max-height: 560px; opacity: 1; }
  .gate-card {
    width: 100%; border: 1px solid var(--line); border-radius: var(--radius);
    background: radial-gradient(520px 260px at 90% 0%, rgba(63,224,139,0.07), transparent 60%), var(--panel);
    box-shadow: 0 30px 70px rgba(0,0,0,0.5);
    padding: 34px 30px 32px; text-align: left;
    transform: translateY(18px); transition: transform 1.15s cubic-bezier(0.76, 0, 0.24, 1) .08s;
  }
  body.stage-unlock .gate-card { transform: none; }
  .gate-card .prompt {
    font-family: "JetBrains Mono", monospace; font-size: var(--t-xs); letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--accent); margin: 0 0 8px;
  }
  .gate-card h1 { font-size: var(--t-xl); letter-spacing: -0.02em; font-weight: 600; line-height: 1.2; margin: 0 0 22px; }
  .gate-field { display: flex; flex-direction: column; gap: 12px; }
  .gate-field input {
    width: 100%; height: 50px; padding: 0 16px; border-radius: var(--radius-sm);
    border: 1px solid var(--line-2); background: rgba(255,255,255,0.02); color: var(--text);
    font-family: "Space Grotesk", system-ui, sans-serif; font-size: var(--t-base); letter-spacing: 0.02em;
    transition: border-color .2s var(--ease), box-shadow .2s var(--ease), background .2s;
  }
  .gate-field input::placeholder { color: var(--muted-2); }
  .gate-field input:focus {
    outline: none; border-color: var(--accent-dim); background: rgba(63,224,139,0.03);
    box-shadow: 0 0 0 3px rgba(63,224,139,0.14);
  }
  .gate-field input.err { border-color: #e0533f; box-shadow: 0 0 0 3px rgba(224,83,63,0.16); }
  .gate-card .cta { width: 100%; height: 50px; justify-content: center; font-size: var(--t-base); }
  .gate-msg {
    min-height: 20px; margin: 14px 2px 0; font-size: var(--t-sm); color: #ff8f7d;
    opacity: 0; transition: opacity .2s var(--ease);
  }
  .gate-msg.show { opacity: 1; }
  .gate-foot {
    margin-top: 26px; font-family: "JetBrains Mono", monospace; font-size: var(--t-xs);
    letter-spacing: 0.06em; color: var(--muted-2);
  }

  @media (prefers-reduced-motion: no-preference) {
    .gate-card.shake { animation: shake .42s var(--ease); }
    @keyframes shake {
      10%, 90% { transform: translateX(-2px); }
      20%, 80% { transform: translateX(4px); }
      30%, 50%, 70% { transform: translateX(-8px); }
      40%, 60% { transform: translateX(8px); }
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .gate-inner, .gate .lockup, .splash, .card-wrap, .gate-card { transition: none !important; }
    .dots span { animation: none; opacity: 1; }
    body:not(.stage-unlock) .gate .lockup { transform: none; }
  }
  @media (max-width: 680px) {
    .gate { padding: 40px 18px; }
    .gate .wordmark .name { font-size: 1.45rem; }
    .gate-card { padding: 28px 22px 26px; }
  }
</style>
</head>
<body>
  <div class="bg-field" aria-hidden="true"></div>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="glows" aria-hidden="true">
    <span class="star s1"></span>
    <span class="star s2"></span>
    <span class="star s3"></span>
    <span class="star s4"></span>
    <span class="star s5"></span>
  </div>

  <main class="gate">
    <div class="gate-inner" id="inner">
      <div class="lockup" aria-label="TEZ Creations">
        <span class="mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="#3fe08b">
            <path d="M12 1.5 L14.4 9.6 L22.5 12 L14.4 14.4 L12 22.5 L9.6 14.4 L1.5 12 L9.6 9.6 Z"/>
          </svg>
        </span>
        <span class="wordmark">
          <span class="name">TEZ Creations</span>
          <span class="sub">Studio</span>
        </span>
      </div>

      <!-- splash: coming soon + Enter -->
      <div class="splash" id="splash">
        <p class="coming">Something great is on the way<span class="dots"><span>.</span><span>.</span><span>.</span></span></p>
        <button class="cta enter-btn" type="button" id="enterBtn">
          Enter
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h9m0 0-3.5-3.5M12 8l-3.5 3.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <!-- password panel (opens after Enter) -->
      <div class="card-wrap">
        <form class="gate-card" id="gateForm" novalidate>
          <p class="prompt">Private preview</p>
          <h1>Enter the password to come in.</h1>
          <div class="gate-field">
            <input id="pw" type="password" name="password" placeholder="Password"
              autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
              aria-label="Password" aria-describedby="gateMsg" />
            <button class="cta" type="submit">
              Unlock
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h9m0 0-3.5-3.5M12 8l-3.5 3.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
          <p class="gate-msg" id="gateMsg" role="alert" aria-live="polite"></p>
        </form>
      </div>

      <p class="gate-foot">TEZ Creations · redesign preview</p>
    </div>
  </main>

  <script>
    (function () {
      var body = document.body;
      var enterBtn = document.getElementById('enterBtn');
      var form = document.getElementById('gateForm');
      var input = document.getElementById('pw');
      var msg = document.getElementById('gateMsg');
      var PASSWORD = 'tez2026';
      var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      // Stage 1 → 2: logo settles, password panel opens
      enterBtn.addEventListener('click', function () {
        if (body.classList.contains('stage-unlock')) return;
        body.classList.add('stage-unlock');
        setTimeout(function () { input.focus(); }, reduce ? 0 : 1150);
      });

      function fail() {
        msg.textContent = 'Not quite — try again';
        msg.classList.add('show');
        input.classList.add('err');
        if (!reduce) {
          form.classList.remove('shake');
          void form.offsetWidth;
          form.classList.add('shake');
        }
        input.value = '';
        input.focus();
      }

      // Stage 2 → 3: correct password → slide the whole gate up into the home
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        if (input.value === PASSWORD) {
          try { sessionStorage.setItem('tez_access', '1'); } catch (err) {}
          input.blur();
          body.classList.add('stage-done');
          setTimeout(function () { window.location.href = '/preview/concept-d'; }, reduce ? 60 : 1200);
        } else {
          fail();
        }
      });

      input.addEventListener('input', function () {
        if (input.classList.contains('err')) {
          input.classList.remove('err');
          msg.classList.remove('show');
        }
      });
    })();
  </script>
</body>
</html>
