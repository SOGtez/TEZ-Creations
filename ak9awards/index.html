<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AK9 AWARDS</title>
<meta name="description" content="Vote for the AK9 community awards. Log in with Twitch to cast your ballot." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Anton&family=Special+Elite&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/ak9awards/ak9.css" />
<link rel="stylesheet" href="/ak9awards/ak9-crime.css" />
</head>
<body>
  <div class="grid-wrap"><div class="grid"></div></div><div class="aura"></div><div class="beams"></div><div class="grain"></div><div class="vig"></div>

  <div class="wrap">
    <div class="top">
      <div id="acct" class="acct"></div>
      <a id="adminLink" class="adminlink hidden" href="/ak9awards/admin">Admin ↗</a>
    </div>

    <div class="hero">
      <div class="kick">AleksK9 presents…</div>
      <div class="word">AK9 AWARDS</div>
      <div class="month" id="month"></div>
      <div class="rule"></div>
    </div>

    <div id="countWrap" class="hidden">
      <div class="count" id="count"></div>
      <div class="countlbl" id="countLbl"></div>
    </div>

    <div id="view"><div class="spin"></div></div>

    <div class="foot">
      One vote per Twitch account · Your picks stay private until results are announced.<br>
      AK9 AWARDS · a community vote
    </div>
  </div>

  <div id="toast" class="toast"></div>

<script>
/* ============================================================
   AK9 AWARDS — voter page
   Standalone (no TEZ chrome). Twitch login → follow-gated ballot → one vote.
   ============================================================ */
const CLIENT_ID = 'i5n7ykd3ns3n0fxgbith466dnj51fc';
const CHANNEL = 'aleksk9_';
const REDIRECT = location.origin + '/ak9awards/';
const $ = s => document.querySelector(s);
const view = $('#view');

const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c =>
  ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

let TOK = sessionStorage.getItem('ak9_tok') || '';
let USER = null; try { USER = JSON.parse(sessionStorage.getItem('ak9_user') || 'null'); } catch (_) {}
let BALLOT = null;          // { settings, awards }
let ME = null;             // status from /api/ak9?route=me
let selection = {};        // awardId -> nomineeId
let deadlineMs = null, countTimer = null, countPhase = 'vote';

/* ---------- helpers ---------- */
function toast(msg, isErr) {
  const t = $('#toast'); t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(toast._t); toast._t = setTimeout(() => t.className = 'toast', 2800);
}
async function api(path, opts = {}) {
  const headers = Object.assign({}, opts.headers || {});
  if (TOK) headers.Authorization = 'Bearer ' + TOK;
  if (opts.body) headers['Content-Type'] = 'application/json';
  const r = await fetch(path, { method: opts.method || 'GET', headers,
    body: opts.body ? JSON.stringify(opts.body) : undefined });
  let j = null; try { j = await r.json(); } catch (_) {}
  return { ok: r.ok, status: r.status, json: j || {} };
}
function b64e(obj) { return btoa(unescape(encodeURIComponent(JSON.stringify(obj)))); }
function b64d(s) { try { return JSON.parse(decodeURIComponent(escape(atob(s)))); } catch (_) { return null; } }

function login(role) {
  const csrf = Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);
  sessionStorage.setItem('ak9_csrf', csrf);
  const state = b64e({ c: csrf, ret: role === 'broadcaster' ? 'admin' : (role === 'admin' ? 'admin' : ''),
    role: role === 'broadcaster' ? 'broadcaster' : 'voter' });
  const scope = role === 'broadcaster' ? 'moderator:read:followers' : '';
  const u = 'https://id.twitch.tv/oauth2/authorize?client_id=' + CLIENT_ID +
    '&redirect_uri=' + encodeURIComponent(REDIRECT) + '&response_type=code' +
    '&scope=' + encodeURIComponent(scope) + '&state=' + encodeURIComponent(state);
  location.href = u;
}
function logout() {
  sessionStorage.removeItem('ak9_tok'); sessionStorage.removeItem('ak9_user');
  TOK = ''; USER = null; ME = null; selection = {};
  renderAccount(); boot();
}
window.ak9Login = login; window.ak9Logout = logout;

/* ---------- account chip ---------- */
function renderAccount() {
  const el = $('#acct');
  if (USER) {
    el.innerHTML = (USER.profile_image_url ? '<img src="' + esc(USER.profile_image_url) + '" alt="">' : '') +
      '<span>@' + esc(USER.login) + '</span><span class="out" onclick="ak9Logout()">log out</span>';
  } else el.innerHTML = '';
  $('#adminLink').classList.toggle('hidden', !(ME && ME.isAdmin));
}

/* ---------- countdown ---------- */
function startCountdown() {
  clearInterval(countTimer);
  const wrap = $('#countWrap');
  if (!deadlineMs) { wrap.classList.add('hidden'); return; }
  wrap.classList.remove('hidden');
  // build the four boxes once (staggered entrance), then update digits in place
  const labels = ['days', 'hrs', 'min', 'sec'];
  $('#count').innerHTML = labels.map((l, i) =>
    '<div class="cbox" style="animation-delay:' + (i * 0.06) + 's"><b>00</b><span>' + l + '</span></div>').join('');
  const boxes = [...$('#count').querySelectorAll('.cbox')];
  const tick = () => {
    const diff = deadlineMs - Date.now();
    if (diff <= 0) {
      boxes.forEach(b => b.querySelector('b').textContent = '00');
      $('#countLbl').textContent = countPhase === 'nominate-open' ? 'Nominations are open'
        : countPhase === 'nominate' ? 'Nominations have ended' : 'Voting has ended';
      clearInterval(countTimer);
      boot();   // flip to the next state
      return;
    }
    const vals = [Math.floor(diff / 86400000), Math.floor(diff % 86400000 / 3600000),
      Math.floor(diff % 3600000 / 60000), Math.floor(diff % 60000 / 1000)];
    vals.forEach((v, i) => {
      const b = boxes[i].querySelector('b'), t = pad(v);
      if (b.textContent !== t) {                       // only the changed digit pops
        b.textContent = t;
        boxes[i].classList.remove('tick'); void boxes[i].offsetWidth; boxes[i].classList.add('tick');
      }
    });
    $('#countLbl').textContent = countPhase === 'nominate-open' ? 'until nominations open'
      : countPhase === 'nominate' ? 'until nominations close' : 'until voting closes';
  };
  tick(); countTimer = setInterval(tick, 1000);
}
const pad = n => String(n).padStart(2, '0');

/* ---------- award/ballot rendering ---------- */
function nomTile(award, n, readonly, selectedId) {
  const sel = selectedId === n.id;
  const av = n.image ? '<span class="av" style="background-image:url(\'' + esc(n.image) + '\')"></span>'
    : '<span class="av">' + esc((n.name || '?').slice(0, 1).toUpperCase()) + '</span>';
  return '<button class="nom' + (sel ? ' sel' : '') + '" type="button"' +
    (readonly ? ' tabindex="-1"' : ' data-award="' + esc(award.id) + '" data-nom="' + esc(n.id) + '"') + '>' +
    av + '<span class="nm">' + esc(n.name) + '</span>' +
    '<span class="tick"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span></button>';
}
function awardCard(award, i, readonly, picks) {
  if (isCrime()) return crimeLineupCard(award, i, readonly, picks);
  const selId = picks ? picks[award.id] : selection[award.id];
  const noms = (award.nominees || []).map(n => nomTile(award, n, readonly, selId)).join('');
  return '<div class="award' + (readonly ? ' readonly' : '') + '" data-award="' + esc(award.id) + '"' +
    ' style="animation-delay:' + (i * 0.07) + 's">' +
    '<div class="anum">AWARD ' + pad(i + 1) + '</div>' +
    '<div class="atitle">' + esc(award.title) + '</div>' +
    (award.description ? '<div class="adesc">' + esc(award.description) + '</div>' : '') +
    '<div class="noms">' + (noms || '<span class="adesc">No nominees yet.</span>') + '</div></div>';
}
// Crime theme: the vote card is a case-file dossier with a suspect line-up.
// Rows keep class "nom" + data-award/data-nom so onPick/updateProgress work unchanged.
function crimeLineupCard(award, i, readonly, picks) {
  const selId = picks ? picks[award.id] : selection[award.id];
  const tilt = (i % 2 ? '-.5deg' : '.5deg');
  const suspects = (award.nominees || []).map(n => {
    const sel = selId === n.id;
    const mug = n.image
      ? '<span class="mugshot" style="background-image:url(\'' + esc(n.image) + '\')"><span class="mtag">AK9-' + pad(i + 1) + '</span></span>'
      : '<span class="mugshot"><span class="mtag">AK9-' + pad(i + 1) + '</span>' + esc((n.name || '?').slice(0, 1).toUpperCase()) + '</span>';
    return '<div class="nom suspect' + (sel ? ' sel' : '') + '"' +
      (readonly ? ' tabindex="-1"' : ' data-award="' + esc(award.id) + '" data-nom="' + esc(n.id) + '"') + '>' +
      mug + '<div class="s-info"><div class="s-nm">' + esc(n.name) + '</div><div class="s-sub">Person of interest</div></div>' +
      '<span class="indict">Indict</span></div>';
  }).join('');
  return '<div class="award dossier" data-award="' + esc(award.id) + '" style="--tilt:' + tilt + '">' +
    '<span class="d-tab">Case #AK9-' + pad(i + 1) + '</span><span class="d-stamp">In review</span>' +
    '<div class="d-head"><div class="charge">' + esc(award.title) + '</div>' +
    (award.description ? '<div class="allegation"><b>Allegation</b> · ' + esc(award.description) + '</div>' : '') + '</div>' +
    '<div class="d-body"><div class="lineup-hd">■ Suspect line-up · identify the prime suspect ■</div>' +
    (suspects || '<div class="s-sub">No suspects yet.</div>') + '</div></div>';
}

function renderBallot() {
  const awards = BALLOT.awards || [];
  if (!awards.length) { renderMessage('🏆', 'Awards coming soon', 'The nominees haven’t been posted yet. Check back shortly.'); return; }
  let html = '<div class="awards">' + awards.map((a, i) => awardCard(a, i, false)).join('') + '</div>';
  html += '<div class="ballot-foot"><div class="prog" id="prog"></div>' +
    '<button class="btn" id="submitBtn" type="button" disabled>Submit ballot</button></div>';
  view.innerHTML = html;
  view.querySelectorAll('.nom[data-nom]').forEach(b => b.addEventListener('click', onPick));
  $('#submitBtn').addEventListener('click', submitVote);
  updateProgress();
}
function onPick(e) {
  const b = e.currentTarget, awardId = b.dataset.award, nomId = b.dataset.nom;
  selection[awardId] = nomId;
  const card = view.querySelector('.award[data-award="' + cssEsc(awardId) + '"]');
  card.querySelectorAll('.nom').forEach(n => n.classList.toggle('sel', n.dataset.nom === nomId));
  updateProgress();
}
function cssEsc(s) { return String(s).replace(/["\\]/g, '\\$&'); }
function updateProgress() {
  const total = (BALLOT.awards || []).length;
  const done = (BALLOT.awards || []).filter(a => selection[a.id]).length;
  $('#prog').innerHTML = '<b>' + done + '</b> of <b>' + total + '</b> awards chosen';
  $('#submitBtn').disabled = done < total;
}
async function submitVote() {
  const btn = $('#submitBtn'); btn.disabled = true; btn.textContent = 'Submitting…';
  const r = await api('/api/ak9?route=vote', { method: 'POST', body: { choices: selection } });
  if (r.ok) { toast('Your ballot is in 🏆'); ME.hasVoted = true; ME.choices = Object.assign({}, selection); renderVoted(); return; }
  const err = r.json.error || 'Could not submit — try again.';
  if (err === 'already_voted') { toast('You’ve already voted.', true); ME.hasVoted = true; boot(); return; }
  if (err === 'follow_required') { toast('You need to follow the channel to vote.', true); boot(); return; }
  btn.textContent = 'Submit ballot'; btn.disabled = false;
  toast(err, true);
}

/* ---------- states ---------- */
function renderMessage(emoji, h, p, btns) {
  view.innerHTML = '<div class="panel center"><div class="msg-emoji">' + emoji + '</div>' +
    '<div class="msg-h">' + esc(h) + '</div><div class="msg-p">' + p + '</div>' +
    (btns ? '<div class="btnrow">' + btns + '</div>' : '') + '</div>';
}
const twitchBtn = (label, role) => '<button class="btn" type="button" onclick="ak9Login(' +
  (role ? "'" + role + "'" : '') + ')"><svg viewBox="0 0 24 24"><path d="M4 3l-1 4v13h5v3h3l3-3h4l5-5V3H4zm16 11l-3 3h-5l-3 3v-3H6V5h14v9zM15 8h2v5h-2V8zm-5 0h2v5h-2V8z"/></svg>' + esc(label) + '</button>';

function renderGuest() {
  // show the awards read-only with a login CTA
  const awards = BALLOT.awards || [];
  let html = '<div class="panel center"><div class="msg-h">Log in to vote</div>' +
    '<div class="msg-p">Sign in with Twitch and follow <b>@' + esc(CHANNEL) + '</b> to cast your ballot. One vote per account.</div>' +
    '<div class="btnrow">' + twitchBtn('Log in with Twitch') + '</div></div>';
  if (awards.length) html += '<div class="awards">' + awards.map((a, i) => awardCard(a, i, true, {})).join('') + '</div>';
  view.innerHTML = html;
}
function renderFollow(mode) {
  const nom = mode === 'nominate';
  renderMessage('➕', nom ? 'Follow to nominate' : 'Follow to vote',
    'AK9 AWARDS ' + (nom ? 'nominations are' : 'voting is') + ' open to followers of <b>@' + esc(CHANNEL) + '</b>. Follow the channel, then come back and re-check.',
    '<a class="btn" href="https://twitch.tv/' + esc(CHANNEL) + '" target="_blank" rel="noopener">Follow @' + esc(CHANNEL) + '</a>' +
    '<button class="btn ghost" type="button" onclick="ak9Recheck()">I’m following — re-check</button>');
}
function renderGuestNominate() {
  const awards = BALLOT.awards || [];
  let html = '<div class="panel center"><div class="msg-h">Log in to nominate</div>' +
    '<div class="msg-p">Sign in with Twitch and follow <b>@' + esc(CHANNEL) + '</b> to nominate for the AK9 AWARDS. One submission per account.</div>' +
    '<div class="btnrow">' + twitchBtn('Log in with Twitch') + '</div></div>';
  if (awards.length) html += '<div class="nom-intro">This month’s awards:</div><div class="awards">' +
    awards.map((a, i) => nominateCard(a, i, '', true)).join('') + '</div>';
  view.innerHTML = html;
}
window.ak9Recheck = async function () { toast('Checking…'); await loadMe(); boot(); };

function renderVoted() {
  const awards = BALLOT.awards || [];
  const picks = ME.choices || {};
  const list = awards.map(a => {
    const n = (a.nominees || []).find(x => x.id === picks[a.id]);
    return '<div class="pick"><span class="pa">' + esc(a.title) + '</span><span class="pn">' +
      esc(n ? n.name : '—') + '</span></div>';
  }).join('');
  view.innerHTML = '<div class="panel center"><div class="msg-emoji">✅</div>' +
    '<div class="msg-h">Your ballot is in</div>' +
    '<div class="msg-p">Thanks for voting in the AK9 AWARDS. You can’t change your picks now — here’s what you submitted:</div>' +
    '<div class="picks" style="max-width:520px;margin:18px auto 0">' + list + '</div></div>';
}
function renderClosed() {
  const voted = ME && ME.hasVoted;
  let extra = '';
  if (voted) {
    const awards = BALLOT.awards || [], picks = ME.choices || {};
    extra = '<div class="picks" style="max-width:520px;margin:18px auto 0">' + awards.map(a => {
      const n = (a.nominees || []).find(x => x.id === picks[a.id]);
      return '<div class="pick"><span class="pa">' + esc(a.title) + '</span><span class="pn">' + esc(n ? n.name : '—') + '</span></div>';
    }).join('') + '</div>';
  }
  view.innerHTML = '<div class="panel center"><div class="msg-emoji">🔒</div>' +
    '<div class="msg-h">Voting is closed</div>' +
    '<div class="msg-p">Thanks to everyone who voted.' +
    (voted ? ' Your submitted ballot:' : '') + '</div>' + extra +
    '<div class="btnrow"><a class="btn" href="/ak9awards/results">See the winners →</a></div></div>';
}

/* ---------- phase 1: nominations ---------- */
function nominateCard(award, i, value, readonly) {
  if (isCrime()) return crimeIntakeCard(award, i, value, readonly);
  return '<div class="award" data-award="' + esc(award.id) + '" style="animation-delay:' + (i * 0.07) + 's">' +
    '<div class="anum">AWARD ' + pad(i + 1) + '</div>' +
    '<div class="atitle">' + esc(award.title) + '</div>' +
    (award.description ? '<div class="adesc">' + esc(award.description) + '</div>' : '') +
    '<input class="nom-input" data-award="' + esc(award.id) + '" type="text" maxlength="60" ' +
      'autocomplete="off" spellcheck="false" placeholder="Who deserves this? Type a name…"' +
      (readonly ? ' value="' + esc(value || '') + '" disabled' : '') + ' /></div>';
}
// Crime theme: the nominate card is a case-file dossier with a suspect-intake line.
// The <input> keeps class "nom-input" + data-award so submit/progress work unchanged.
function crimeIntakeCard(award, i, value, readonly) {
  const tilt = (i % 2 ? '-.5deg' : '.5deg');
  return '<div class="dossier" style="--tilt:' + tilt + '">' +
    '<span class="d-tab">Case #AK9-' + pad(i + 1) + '</span><span class="d-stamp">Open</span>' +
    '<div class="d-head"><div class="charge">' + esc(award.title) + '</div>' +
    (award.description ? '<div class="allegation"><b>Allegation</b> · ' + esc(award.description) + '</div>' : '') + '</div>' +
    '<div class="d-body"><div class="intake-lbl">▸ Name your prime suspect</div>' +
    '<div class="fill"><span class="fpfx">Suspect</span>' +
    '<input class="nom-input" data-award="' + esc(award.id) + '" type="text" maxlength="60" ' +
      'autocomplete="off" spellcheck="false" placeholder="Who did it?"' +
      (readonly ? ' value="' + esc(value || '') + '" disabled' : '') + ' /></div>' +
    '<div class="intake-note">Confidential · one tip per case</div></div></div>';
}
function renderNominate() {
  const awards = BALLOT.awards || [];
  if (!awards.length) { renderMessage('🏆', 'Nominations coming soon', 'The awards haven’t been posted yet. Check back shortly.'); return; }
  let html = '<div class="nom-intro">Name one person for <b>every</b> award — the button unlocks once all are filled in. After nominations close, the top names become the finalists you’ll vote on.</div>';
  html += '<div class="awards">' + awards.map((a, i) => nominateCard(a, i, '', false)).join('') + '</div>';
  html += '<div class="ballot-foot"><div class="prog" id="prog"></div>' +
    '<button class="btn" id="nomBtn" type="button" disabled>Submit nominations</button></div>';
  view.innerHTML = html;
  view.querySelectorAll('.nom-input').forEach(inp => inp.addEventListener('input', updateNomProgress));
  $('#nomBtn').addEventListener('click', submitNominations);
  updateNomProgress();
}
function updateNomProgress() {
  const filled = [...view.querySelectorAll('.nom-input')].filter(i => i.value.trim()).length;
  const total = (BALLOT.awards || []).length;
  $('#prog').innerHTML = '<b>' + filled + '</b> of <b>' + total + '</b> awards nominated';
  $('#nomBtn').disabled = filled < total;   // every award must have a name
}
async function submitNominations() {
  const choices = {};
  view.querySelectorAll('.nom-input').forEach(i => { const v = i.value.trim(); if (v) choices[i.dataset.award] = v; });
  const total = (BALLOT.awards || []).length;
  if (Object.keys(choices).length < total) { toast('Name someone for every award before submitting.', true); return; }
  const btn = $('#nomBtn'); btn.disabled = true; btn.textContent = 'Submitting…';
  const r = await api('/api/ak9?route=nominate', { method: 'POST', body: { choices } });
  if (r.ok) { toast('Nominations submitted 🙌'); ME.hasNominated = true; ME.nominateChoices = choices; renderNominated(); return; }
  const err = r.json.error || 'Could not submit — try again.';
  if (err === 'already_nominated') { toast('You’ve already nominated.', true); ME.hasNominated = true; boot(); return; }
  if (err === 'follow_required') { toast('You need to follow the channel to nominate.', true); boot(); return; }
  btn.textContent = 'Submit nominations'; btn.disabled = false;
  toast(err, true);
}
function renderNominated() {
  const awards = BALLOT.awards || [], picks = (ME && ME.nominateChoices) || {};
  const list = awards.filter(a => picks[a.id]).map(a =>
    '<div class="pick"><span class="pa">' + esc(a.title) + '</span><span class="pn">' + esc(picks[a.id]) + '</span></div>').join('');
  view.innerHTML = '<div class="panel center"><div class="msg-emoji">🙌</div>' +
    '<div class="msg-h">Your nominations are in</div>' +
    '<div class="msg-p">Thanks! When nominations close, the top picks become the finalists — come back to vote.' +
    '</div><div class="picks" style="max-width:520px;margin:18px auto 0">' + (list || '<span class="adesc">—</span>') + '</div></div>';
}

/* ---------- status load + routing ---------- */
async function loadMe() {
  if (!TOK) { ME = null; return; }
  const r = await api('/api/ak9?route=me');
  if (r.status === 401) { logout(); return; }
  if (r.ok) ME = r.json; else ME = null;
}
function settingsNow() { return (ME && ME.settings) || (BALLOT && BALLOT.settings) || {}; }
function phaseOf() { return settingsNow().phase || 'vote'; }
function votingClosed() {
  const s = settingsNow();
  if (s.phase === 'closed') return true;
  if (s.voting_open === false) return true;
  if (s.deadline && Date.now() > new Date(s.deadline).getTime()) return true;
  return false;
}
function nominateClosed() {
  const s = settingsNow();
  return !!(s.nominate_deadline && Date.now() > new Date(s.nominate_deadline).getTime());
}
function nominateOpensAt() {
  const s = settingsNow();
  return s.nominate_open ? new Date(s.nominate_open).getTime() : null;
}
function fmtWhen2(ms) {
  try { return new Date(ms).toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }); }
  catch (_) { return ''; }
}
function isCrime() { return (settingsNow().theme || 'classic') === 'crime'; }
// crime theme adds a police-tape band + a case-number chip + a forensic kicker.
function setupCrimeChrome(s) {
  if (!document.querySelector('.tape')) {
    const tape = document.createElement('div'); tape.className = 'tape t1';
    tape.innerHTML = '<span>CRIME SCENE · DO NOT CROSS · AK9 EVIDENCE</span>';
    document.body.insertBefore(tape, document.body.firstChild);
  }
  const top = document.querySelector('.top');
  if (top && !top.querySelector('.caseno')) {
    const c = document.createElement('span'); c.className = 'caseno'; top.insertBefore(c, top.firstChild);
  }
  const caseno = document.querySelector('.top .caseno');
  if (caseno) caseno.textContent = 'Case #AK9 · ' + (s.month_label || '').toUpperCase();
  const kick = document.querySelector('.hero .kick');
  if (kick) kick.textContent = 'AleksK9 · Forensics Unit presents…';
}
function boot() {
  renderAccount();
  if (!BALLOT) return;
  const s = settingsNow();
  const phase = phaseOf();
  // theme skin (classic is the guaranteed fallback)
  const theme = s.theme || 'classic';
  document.body.classList.toggle('theme-crime', theme === 'crime');
  document.body.dataset.ak9phase = phase;
  if (theme === 'crime') setupCrimeChrome(s);
  // subline: crime theme reframes it as the case log; classic just shows the month
  const crimeSub = { nominate: 'Tip Line', vote: 'Evidence Log', closed: 'Case Closed' }[phase] || '';
  $('#month').textContent = (theme === 'crime' && crimeSub)
    ? (s.month_label ? crimeSub + ' · ' + s.month_label : crimeSub)
    : (s.month_label || '');
  // countdown tracks whichever phase's deadline is live
  countPhase = phase;
  deadlineMs = (phase === 'nominate')
    ? (s.nominate_deadline ? new Date(s.nominate_deadline).getTime() : null)
    : (s.deadline ? new Date(s.deadline).getTime() : null);
  startCountdown();

  if (phase === 'nominate') {
    // scheduled open: before the tip line goes live, count down to it (everyone, logged in or not)
    const openAt = nominateOpensAt();
    if (openAt && Date.now() < openAt) {
      countPhase = 'nominate-open'; deadlineMs = openAt; startCountdown();
      renderMessage('🕵️', 'Nominations open soon',
        'The tip line opens <b>' + esc(fmtWhen2(openAt)) + '</b>. Come back then to submit your picks.');
      return;
    }
    if (!TOK || !ME) { renderGuestNominate(); return; }
    if (nominateClosed()) { renderMessage('⏳', 'Nominations closed', 'Voting on the finalists opens soon — check back shortly!'); return; }
    if (!ME.broadcasterReady && !ME.isAdmin) { renderMessage('⏳', 'Nominations open soon', 'Almost ready — check back in a bit!'); return; }
    if (ME.hasNominated) { renderNominated(); return; }
    if (!ME.isFollower) { renderFollow('nominate'); return; }
    renderNominate();
    return;
  }

  // phase = vote (or closed)
  if (!TOK || !ME) { renderGuest(); return; }
  if (votingClosed()) { renderClosed(); return; }
  if (!ME.broadcasterReady && !ME.isAdmin) {
    renderMessage('⏳', 'Voting opens soon', 'The ballot isn’t quite ready yet. Check back in a bit!'); return;
  }
  if (ME.hasVoted) { renderVoted(); return; }
  if (!ME.isFollower) { renderFollow('vote'); return; }
  renderBallot();
}

/* ---------- OAuth return + init ---------- */
async function handleReturn() {
  const p = new URLSearchParams(location.search);
  const errParam = p.get('error');
  const code = p.get('code'), state = p.get('state');
  if (!errParam && !code) return;
  // Parse state up front so we know the role even on an error return.
  const st = state ? (b64d(state) || {}) : {};
  const role = st.role === 'broadcaster' ? 'broadcaster' : 'voter';
  const toAdmin = (q) => location.replace('/ak9awards/admin' + q);
  history.replaceState({}, '', REDIRECT);

  // Twitch bounced back with an error (e.g. the user hit Cancel, or a config issue).
  if (errParam) {
    const msg = p.get('error_description') || errParam;
    if (role === 'broadcaster') { toAdmin('?bc=error&msg=' + encodeURIComponent(msg)); return; }
    toast('Twitch login was cancelled.', true); return;
  }
  if (!code || !state) return;

  const csrf = sessionStorage.getItem('ak9_csrf');
  if (csrf && st.c && st.c !== csrf) {
    if (role === 'broadcaster') { toAdmin('?bc=error&msg=' + encodeURIComponent('login expired — try again')); return; }
    toast('Login expired — try again.', true); return;
  }
  sessionStorage.removeItem('ak9_csrf');

  view.innerHTML = '<div class="spin"></div>';
  const r = await api('/api/ak9?route=auth', { method: 'POST', body: { code, redirect_uri: REDIRECT, role } });

  // Broadcaster connect: always land on the admin page with a clear result.
  if (role === 'broadcaster') {
    if (r.ok) toAdmin('?bc=ok');
    else toAdmin('?bc=error&msg=' + encodeURIComponent(r.json.error || 'connect failed'));
    return;
  }

  if (!r.ok) { toast(r.json.error || 'Login failed — try again.', true); return; }
  TOK = r.json.access_token; USER = r.json.user;
  sessionStorage.setItem('ak9_tok', TOK); sessionStorage.setItem('ak9_user', JSON.stringify(USER));
  if (st.ret === 'admin') { location.replace('/ak9awards/admin'); return; }
}

/* ---- living grid: warp toward the cursor (desktop) / device tilt (mobile) — same as the site ---- */
function setupGridWarp() {
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const grid = document.querySelector('.grid');
  if (!grid || reduce) return;
  let tx = 0, ty = 0, cx = 0, cy = 0;
  window.addEventListener('mousemove', (e) => {
    tx = (e.clientX / window.innerWidth - 0.5) * 2;
    ty = (e.clientY / window.innerHeight - 0.5) * 2;
  });
  (function () {                                   // mobile: tilt the phone to warp the grid
    let b0 = null, g0 = null;
    const clamp = (v) => Math.max(-1.6, Math.min(1.6, v));
    function onTilt(e) {
      if (e.gamma == null || e.beta == null) return;
      if (g0 === null) { g0 = e.gamma; b0 = e.beta; }
      tx = clamp((e.gamma - g0) / 18); ty = clamp((e.beta - b0) / 18);
    }
    const D = window.DeviceOrientationEvent;
    if (D && typeof D.requestPermission === 'function') {
      const ask = () => D.requestPermission().then((s) => { if (s === 'granted') window.addEventListener('deviceorientation', onTilt); }).catch(() => {});
      window.addEventListener('touchend', ask, { once: true });
      window.addEventListener('click', ask, { once: true });
    } else if (D) { window.addEventListener('deviceorientation', onTilt); }
  })();
  (function tick() {
    cx += (tx - cx) * 0.06; cy += (ty - cy) * 0.06;
    grid.style.transform =
      `perspective(1200px) rotateX(${(-cy * 1.6).toFixed(3)}deg) rotateY(${(cx * 1.6).toFixed(3)}deg) translate(${(-cx * 8).toFixed(2)}px, ${(-cy * 8).toFixed(2)}px) scale(1.08)`;
    requestAnimationFrame(tick);
  })();
}
setupGridWarp();

async function init() {
  await handleReturn();
  // public ballot (always)
  try {
    const b = await api('/api/ak9?route=ballot');
    if (b.ok) BALLOT = b.json;
    else if (b.status === 503) { renderMessage('🛠️', 'Coming soon', 'AK9 AWARDS isn’t live yet. Check back shortly.'); return; }
    else BALLOT = { settings: {}, awards: [] };
  } catch (_) { BALLOT = { settings: {}, awards: [] }; }
  await loadMe();
  boot();
}
init();
