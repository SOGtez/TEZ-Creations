<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AK9 AWARDS — Results</title>
<meta name="description" content="The winners of the AK9 community awards, revealed." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Anton&family=Special+Elite&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/ak9awards/ak9.css" />
<link rel="stylesheet" href="/ak9awards/ak9-crime.css" />
</head>
<body>
  <div class="grid-wrap"><div class="grid"></div></div><div class="aura"></div><div class="beams"></div><div class="grain"></div><div class="vig"></div>

  <div class="wrap">
    <div class="top">
      <a class="backlink" href="/ak9awards">← Voting</a>
      <span></span>
    </div>

    <div class="hero">
      <div class="kick">AleksK9 presents…</div>
      <div class="word">AK9 AWARDS</div>
      <div class="results-tag">The Winners</div>
      <div class="month" id="month"></div>
      <div class="rule"></div>
    </div>

    <div id="view"><div class="spin"></div></div>

    <div class="foot">
      AK9 AWARDS · a community vote<br>
      Winners are decided by follower votes — one ballot per Twitch account.
    </div>
  </div>

<script>
/* ============================================================
   AK9 AWARDS — results / winners reveal (standalone, public read-only)
   ============================================================ */
const $ = s => document.querySelector(s);
const view = $('#view');
const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c =>
  ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
const pad = n => String(n).padStart(2, '0');
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

let deadlineMs = null, countTimer = null, RES = null;
function isCrime() { return ((RES && RES.settings && RES.settings.theme) || 'classic') === 'crime'; }
const rep = (s, n) => { let o = ''; for (let i = 0; i < n; i++) o += s; return o; };
const targets = n => new Array(n).fill('⊕').join(' ');

async function apiGet(path) {
  const r = await fetch(path);
  let j = null; try { j = await r.json(); } catch (_) {}
  return { ok: r.ok, status: r.status, json: j || {} };
}

/* ---------- countdown (locked state) ---------- */
function startCountdown(labelWrapId) {
  clearInterval(countTimer);
  const wrap = $('#' + labelWrapId);
  if (!wrap || !deadlineMs) return;
  const labels = ['days', 'hrs', 'min', 'sec'];
  wrap.querySelector('.count').innerHTML = labels.map(l =>
    '<div class="cbox"><b>00</b><span>' + l + '</span></div>').join('');
  const boxes = [...wrap.querySelectorAll('.cbox b')];
  const tick = () => {
    const diff = deadlineMs - Date.now();
    if (diff <= 0) { boxes.forEach(b => b.textContent = '00'); clearInterval(countTimer); load(); return; }
    const v = [Math.floor(diff / 86400000), Math.floor(diff % 86400000 / 3600000),
      Math.floor(diff % 3600000 / 60000), Math.floor(diff % 60000 / 1000)];
    boxes.forEach((b, i) => b.textContent = pad(v[i]));
  };
  tick(); countTimer = setInterval(tick, 1000);
}

/* ---------- states ---------- */
function renderMessage(emoji, h, p, btns, extra) {
  view.innerHTML = '<div class="panel center"><div class="msg-emoji">' + emoji + '</div>' +
    '<div class="msg-h">' + esc(h) + '</div><div class="msg-p">' + p + '</div>' +
    (extra || '') + (btns ? '<div class="btnrow">' + btns + '</div>' : '') + '</div>';
}

function renderLocked(settings) {
  deadlineMs = settings.deadline ? new Date(settings.deadline).getTime() : null;
  const countBlock = deadlineMs
    ? '<div id="lockCount" style="margin-top:22px"><div class="count"></div><div class="countlbl">until voting closes</div></div>'
    : '';
  renderMessage('🔒', 'The winners are sealed',
    'Voting is still open — the results stay hidden so the standings can’t be watched or gamed. Come back when voting closes and the winners will be revealed right here.',
    '<a class="btn" href="/ak9awards">Go vote →</a>', countBlock);
  if (deadlineMs) startCountdown('lockCount');
}

function winnerBlock(n, total) {
  const av = n.image ? '<span class="av" style="background-image:url(\'' + esc(n.image) + '\')"></span>'
    : '<span class="av">' + esc((n.name || '?').slice(0, 1).toUpperCase()) + '</span>';
  const pct = total > 0 ? Math.round((n.votes / total) * 100) : 0;
  return '<div class="winner">' + av +
    '<div class="wname">' + esc(n.name) +
    '<div class="wsub">' + pct + '% of the vote</div></div>' +
    '<div class="wvotes">' + n.votes + '<span>vote' + (n.votes === 1 ? '' : 's') + '</span></div>' +
    '<span class="trophy">🏆</span></div>';
}

function nomAv(n) {
  return n.image ? '<span class="av" style="background-image:url(\'' + esc(n.image) + '\')"></span>'
    : '<span class="av">' + esc((n.name || '?').slice(0, 1).toUpperCase()) + '</span>';
}
function winHtml(a) {
  const winners = (a.nominees || []).filter(n => a.winnerIds.indexOf(n.id) !== -1);
  if (!winners.length) return '<div class="nowin">No votes were cast for this award.</div>';
  return '<div class="winlbl">' + (winners.length > 1 ? 'Winners · tie' : 'And the winner is…') + '</div>' +
    winners.map(n => winnerBlock(n, a.total)).join('');
}
function breakdownHtml(a) {
  const max = (a.nominees[0] && a.nominees[0].votes) || 0;
  const rows = (a.nominees || []).map(n => {
    const w = max > 0 ? Math.round((n.votes / max) * 100) : 0;
    const isWin = a.winnerIds.indexOf(n.id) !== -1;
    return '<div class="brow' + (isWin ? ' win' : '') + '">' +
      '<div class="bname">' + esc(n.name) + '</div>' +
      '<div class="bval">' + n.votes + ' · ' + (a.total > 0 ? Math.round((n.votes / a.total) * 100) : 0) + '%</div>' +
      '<div class="track"><i style="--w:' + w + '%"></i></div></div>';
  }).join('');
  return rows ? '<div class="breakdown">' + rows + '</div>' : '';
}
function awardCard(a, i) {
  return '<div class="award" style="animation-delay:' + (i * 0.16).toFixed(2) + 's">' +
    '<div class="anum">AWARD ' + pad(i + 1) + '</div>' +
    '<div class="atitle">' + esc(a.title) + '</div>' +
    (a.description ? '<div class="adesc">' + esc(a.description) + '</div>' : '') +
    winHtml(a) +
    breakdownHtml(a) +
    '</div>';
}

function renderResults(data) {
  RES = data;
  const awards = data.awards || [];
  $('#month').textContent = (isCrime() ? 'Case Closed · ' : '') + (data.settings.month_label || '');
  if (!awards.length) {
    renderMessage('🏆', 'No awards to show', 'There weren’t any awards set up for this round.',
      '<a class="btn" href="/ak9awards">Back to AK9 →</a>');
    return;
  }
  const voters = data.totalVoters || 0;
  const teaser = voters + ' ballot' + (voters === 1 ? '' : 's') + ' cast · ' + awards.length + ' award' + (awards.length === 1 ? '' : 's');

  // crime theme: the evidence-bag reveal ceremony
  if (isCrime()) {
    if (reduceMotion) { crimeShowAll(); return; }
    view.innerHTML = '<div class="reveal-cta" id="revealCta">' +
      '<div class="tally-teaser">' + esc(teaser) + '</div>' +
      '<button class="btn reveal-btn pulse" id="revealBtn" type="button">🔦 Open the case files</button></div>';
    $('#revealBtn').addEventListener('click', () => crimeStep(0));
    return;
  }

  // the finale: every award at once, bars growing
  const showAll = () => {
    view.innerHTML =
      '<div class="awards" id="awards">' + awards.map((a, i) => awardCard(a, i)).join('') + '</div>' +
      '<div class="btnrow" style="margin-top:28px"><a class="btn ghost" href="/ak9awards">Back to AK9 →</a></div>';
    requestAnimationFrame(() => requestAnimationFrame(() => $('#awards').classList.add('go')));
    window.scrollTo({ top: 0, behavior: reduceMotion ? 'auto' : 'smooth' });
  };

  // the ceremony: one award at a time — contenders first, reveal, then next
  const step = (idx, revealed) => {
    const a = awards[idx];
    const dots = awards.map((_, j) =>
      '<span class="cdot' + (j < idx ? ' done' : j === idx ? ' cur' : '') + '"></span>').join('');
    const body = revealed
      ? winHtml(a) + breakdownHtml(a)
      : '<div class="winlbl">The nominees</div><div class="contenders">' +
        (a.nominees || []).map((n, k) =>
          '<div class="cont" style="animation-delay:' + (k * 0.09).toFixed(2) + 's">' +
          nomAv(n) + '<span class="cn">' + esc(n.name) + '</span></div>').join('') + '</div>';
    const btnLabel = !revealed ? '🏆 Reveal the winner'
      : (idx < awards.length - 1 ? 'Next award →' : 'See all results →');
    view.innerHTML =
      '<div class="ceremony">' +
        '<div class="cprog">' + dots + '</div>' +
        '<div class="awards" id="cAw"><div class="award">' +
          '<div class="anum">AWARD ' + pad(idx + 1) + ' OF ' + pad(awards.length) + '</div>' +
          '<div class="atitle">' + esc(a.title) + '</div>' +
          (a.description ? '<div class="adesc">' + esc(a.description) + '</div>' : '') +
          body +
        '</div></div>' +
        '<div class="cbtnrow">' +
          '<button class="btn reveal-btn' + (!revealed ? ' pulse' : '') + '" id="cBtn" type="button">' + btnLabel + '</button>' +
          '<button class="cskip" id="cSkip" type="button">skip the ceremony · show everything</button>' +
        '</div>' +
      '</div>';
    if (revealed) requestAnimationFrame(() => requestAnimationFrame(() => $('#cAw').classList.add('go')));
    $('#cBtn').addEventListener('click', () => {
      if (!revealed) { step(idx, true); return; }
      if (idx < awards.length - 1) {
        step(idx + 1, false);
        window.scrollTo({ top: 0, behavior: reduceMotion ? 'auto' : 'smooth' });
      } else { showAll(); }
    });
    $('#cSkip').addEventListener('click', showAll);
  };

  if (reduceMotion) { showAll(); return; }   // no drama needed — just show it

  view.innerHTML =
    '<div class="reveal-cta" id="revealCta">' +
      '<div class="tally-teaser">' + esc(teaser) + '</div>' +
      '<button class="btn reveal-btn pulse" id="revealBtn" type="button">🏆 Begin the reveal</button>' +
    '</div>';
  $('#revealBtn').addEventListener('click', () => step(0, false));
}

/* ---------- crime theme: evidence-bag reveal ceremony ---------- */
function crimeWinner(a) {
  const ranked = (a.nominees || []).slice().sort((x, y) => y.votes - x.votes);
  const winners = ranked.filter(n => (a.winnerIds || []).indexOf(n.id) !== -1);
  return { ranked, win: winners[0] || ranked[0] || null, tie: winners.length > 1 };
}
// The revealed evidence file (paper award) for one case.
function crimeEvbag(a, idx) {
  const { ranked, win, tie } = crimeWinner(a);
  const total = a.total || 0;
  const solved = !!win && total > 0;
  const pct = solved && total > 0 ? Math.round((win.votes / total) * 100) : 0;
  const runners = ranked.filter(n => n !== win && n.votes > 0).map(n => esc(n.name) + ' (' + n.votes + ')').join(' · ');
  const photo = solved ? (win.image ? '<img src="' + esc(win.image) + '" alt="">' : esc((win.name || '?').slice(0, 1).toUpperCase())) : '?';
  const suspect = solved ? '@' + esc(win.name) : '— unsolved —';
  const month = esc(RES.settings.month_label || '—');
  return '<div class="evbag">' +
    '<div class="ev-strip"><div class="ev-brand">' + rep('AK9 FORENSICS UNIT · ', 9) + '</div>' +
      '<div class="ev-targets">' + targets(15) + '</div>' +
      '<div class="ev-brand">' + rep('TAMPER EVIDENT · DO NOT OPEN · ', 6) + '</div></div>' +
    '<div class="ev-sidewarn l">DO NOT CUT HERE TO OPEN · DO NOT CUT HERE TO OPEN</div>' +
    '<div class="ev-sidewarn r">DO NOT CUT HERE TO OPEN · DO NOT CUT HERE TO OPEN</div>' +
    '<div class="ev-body">' +
      '<div class="ev-barrow"><span class="ev-caseno">AK9-' + pad(idx + 1) + '</span><span class="ev-barcode"></span></div>' +
      '<div class="ev-title">EVIDENCE</div>' +
      '<div class="ev-photo"><span class="ptape"></span><span class="frame"><span class="mugimg">' + photo + '</span>' +
        '<span class="cap">EXHIBIT A · ' + suspect + '</span></span></div>' +
      (solved ? '<div class="ev-guilty">GUILTY</div>' : '') +
      '<div class="ev-f"><label>Agency</label><span class="val">AK9 Forensics Unit</span></div>' +
      '<div class="ev-f"><label>Offense</label><span class="val">' + esc(a.title) + '</span></div>' +
      '<div class="ev-f"><label>Suspect</label><span class="val susp">' + suspect + '</span></div>' +
      '<div class="ev-f"><label>Recovered by</label><span class="val">' +
        (solved ? 'community verdict — ' + win.votes + ' vote' + (win.votes === 1 ? '' : 's') + ' (' + pct + '%)' + (tie ? ' · tie' : '') : 'no votes were cast') + '</span></div>' +
      (a.description ? '<div class="ev-f"><label>Case notes</label><span class="val">' + esc(a.description) + '</span></div>' : '') +
      '<div class="ev-f"><label>Sealed by</label><span class="val">AleksK9 · Forensics Unit</span></div>' +
      '<div class="ev-coc"><h5>Chain of Custody</h5><table>' +
        '<tr><th>Date</th><th>From</th><th>To</th></tr>' +
        '<tr><td>' + month + '</td><td>Community tips</td><td>Finalists</td></tr>' +
        '<tr><td>' + month + '</td><td>The jury</td><td>Verdict: ' + (solved ? 'Guilty' : 'Unsolved') + '</td></tr></table></div>' +
      '<div class="ev-cut">✂ TO REMOVE CONTENTS CUT ALONG BOTTOM DOTTED LINE</div>' +
    '</div></div>' +
    (runners ? '<div class="ev-runners">Also questioned: ' + runners + '</div>' : '');
}
// One sealed-bag face (rendered twice, clipped top/bottom, so it splits cleanly).
function crimeSealFace(a, which, idx) {
  return '<div class="sealface ' + which + '">' +
    '<div class="ev-strip"><div class="ev-brand">' + rep('AK9 FORENSICS UNIT · ', 9) + '</div>' +
      '<div class="ev-targets">' + targets(15) + '</div>' +
      '<div class="ev-brand">' + rep('TAMPER EVIDENT · DO NOT OPEN · ', 6) + '</div></div>' +
    '<div class="ev-body">' +
      '<div class="ev-barrow"><span class="ev-caseno">AK9-' + pad(idx + 1) + '</span><span class="ev-barcode"></span></div>' +
      '<div class="ev-title">EVIDENCE</div>' +
      '<div class="redact-block"><span class="rb"></span><span class="rl">' + esc(a.title) + '</span>' +
        '<span class="rl2">Suspect redacted · sealed pending verdict</span></div>' +
      '<div class="taphint">✂ Tap to cut open</div>' +
    '</div>' +
    '<div class="ev-cut">✂ CUT ALONG DOTTED LINE TO OPEN</div>' +
    '<div class="seal-btm">Chain of custody sealed · do not open</div>' +
    '<span class="sidew l">DO NOT CUT HERE TO OPEN</span><span class="sidew r">DO NOT CUT HERE TO OPEN</span>' +
    '</div>';
}
function crimeSealedCase(a, idx) {
  const awards = RES.awards;
  const dots = awards.map((_, j) => '<span class="cdot' + (j < idx ? ' done' : j === idx ? ' cur' : '') + '"></span>').join('');
  return '<div class="brief">Case ' + (idx + 1) + ' of ' + awards.length + ' · ' + esc(a.title) + '</div>' +
    '<div class="cprog">' + dots + '</div>' +
    '<div class="reveal-case" id="rc"><div class="paper-wrap"><div class="paper">' + crimeEvbag(a, idx) + '</div></div>' +
      '<div class="seal">' + crimeSealFace(a, 'sf-top', idx) + crimeSealFace(a, 'sf-bottom', idx) +
        '<span class="cutline"></span><span class="scissors">✂</span></div></div>' +
    '<div class="cbtnrow"><div class="opencue">Tap the evidence bag to cut it open</div></div>';
}
function crimeStep(idx) {
  const awards = RES.awards, a = awards[idx];
  view.innerHTML = crimeSealedCase(a, idx);
  window.scrollTo({ top: 0, behavior: reduceMotion ? 'auto' : 'smooth' });
  const rc = view.querySelector('#rc'), seal = rc.querySelector('.seal');
  const last = idx === awards.length - 1;
  const addNext = () => {
    const row = view.querySelector('.cbtnrow');
    row.innerHTML = '<button class="btn reveal-btn" id="nextCase" type="button">' + (last ? 'See all case files →' : 'Next case →') + '</button>';
    row.querySelector('#nextCase').addEventListener('click', () => { if (last) crimeShowAll(); else crimeStep(idx + 1); });
  };
  seal.addEventListener('click', () => {
    if (rc.classList.contains('cutting')) return;
    if (reduceMotion) { rc.classList.add('is-open'); seal.style.display = 'none'; rc.querySelector('.paper').classList.add('revealed'); addNext(); return; }
    rc.classList.add('cutting');                                          // blade sweeps the dotted line
    setTimeout(() => rc.classList.add('is-open'), 1050);                  // bag drifts open
    setTimeout(() => rc.querySelector('.paper').classList.add('revealed'), 2500); // GUILTY settles on
    setTimeout(() => { seal.style.display = 'none'; }, 2850);             // drop the spent bag (no scroll void)
    setTimeout(addNext, 2950);
  });
}
function crimeShowAll() {
  const awards = RES.awards;
  view.innerHTML = '<div class="brief">All cases closed · the full evidence log.</div>' +
    '<div id="awards">' + awards.map((a, i) => crimeEvbag(a, i)).join('') + '</div>' +
    '<div class="btnrow" style="margin-top:28px;justify-content:center;display:flex"><a class="btn ghost" href="/ak9awards">Back to AK9 →</a></div>';
  window.scrollTo({ top: 0, behavior: reduceMotion ? 'auto' : 'smooth' });
}

/* ---------- living grid warp (same as the voter page) ---------- */
function setupGridWarp() {
  const grid = document.querySelector('.grid');
  if (!grid || reduceMotion) return;
  let tx = 0, ty = 0, cx = 0, cy = 0;
  window.addEventListener('mousemove', (e) => {
    tx = (e.clientX / window.innerWidth - 0.5) * 2;
    ty = (e.clientY / window.innerHeight - 0.5) * 2;
  });
  (function () {
    let b0 = null, g0 = null;
    const clamp = (v) => Math.max(-1.6, Math.min(1.6, v));
    function onTilt(e) {
      if (e.gamma == null || e.beta == null) return;
      if (g0 === null) { g0 = e.gamma; b0 = e.beta; }
      tx = clamp((e.gamma - g0) / 18); ty = clamp((e.beta - b0) / 18);
    }
    const D = window.DeviceOrientationEvent;
    if (D && typeof D.requestPermission === 'function') {
      const ask = () => D.requestPermission().then((s) => { if (s === 'granted') window.addEventListener('deviceorientation', onTilt); }).catch(() => {});
      window.addEventListener('touchend', ask, { once: true });
      window.addEventListener('click', ask, { once: true });
    } else if (D) { window.addEventListener('deviceorientation', onTilt); }
  })();
  (function tick() {
    cx += (tx - cx) * 0.06; cy += (ty - cy) * 0.06;
    grid.style.transform =
      'perspective(1200px) rotateX(' + (-cy * 1.6).toFixed(3) + 'deg) rotateY(' + (cx * 1.6).toFixed(3) +
      'deg) translate(' + (-cx * 8).toFixed(2) + 'px, ' + (-cy * 8).toFixed(2) + 'px) scale(1.08)';
    requestAnimationFrame(tick);
  })();
}
setupGridWarp();

/* ---------- load ---------- */
function applyTheme(s) {
  const crime = ((s && s.theme) || 'classic') === 'crime';
  document.body.classList.toggle('theme-crime', crime);
  document.body.dataset.ak9phase = 'closed';   // results = case closed
  if (crime) {
    if (!document.querySelector('.tape')) {
      const t = document.createElement('div'); t.className = 'tape t1';
      t.innerHTML = '<span>CRIME SCENE · DO NOT CROSS · AK9 EVIDENCE</span>';
      document.body.insertBefore(t, document.body.firstChild);
    }
    const kick = document.querySelector('.hero .kick');
    if (kick) kick.textContent = 'AleksK9 · Forensics Unit presents…';
  }
}
async function load() {
  const r = await apiGet('/api/ak9?route=results');
  if (r.status === 503) { renderMessage('🛠️', 'Coming soon', 'AK9 AWARDS isn’t live yet. Check back shortly.'); return; }
  if (!r.ok) { renderMessage('⚠️', 'Couldn’t load results', 'Something went wrong. Please try again in a moment.', '<button class="btn" onclick="location.reload()">Retry</button>'); return; }
  applyTheme(r.json.settings || {});
  if (!r.json.revealed) { renderLocked(r.json.settings || {}); return; }
  renderResults(r.json);
}
load();
</script>
</body>
</html>
